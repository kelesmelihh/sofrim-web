<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Durumu — Sofrım</title>
  <meta name="description" content="Sofrım sistemlerinin anlık durum bilgisi.">
  <link rel="canonical" href="https://sofrimapp.com/status.html">
  <link rel="icon" href="https://hvmjkayittkivmfwdmhv.supabase.co/storage/v1/object/public/assets/sofrim_logo.jpeg">
  <link rel="stylesheet" href="style.css">
  <style>
    .status-banner { text-align: center; padding: 24px; border-radius: 16px; margin: 40px 0; }
    .status-banner.ok { background: #4ADE8015; border: 1.5px solid #4ADE8044; }
    .status-banner.warn { background: #FBBF2415; border: 1.5px solid #FBBF2444; }
    .status-banner.error { background: #FF475715; border: 1.5px solid #FF475744; }
    .status-banner-icon { font-size: 40px; margin-bottom: 10px; }
    .status-banner-title { font-size: 20px; font-weight: 900; }
    .status-list { margin: 32px 0; }
    .status-item { display: flex; align-items: center; gap: 14px; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok { background: #4ADE80; }
    .dot-warn { background: #FBBF24; }
    .dot-error { background: #FF4757; }
    .status-name { flex: 1; font-weight: 700; font-size: 14px; }
    .status-label { font-size: 12px; font-weight: 700; }
    .label-ok { color: #4ADE80; }
    .label-warn { color: #FBBF24; }
    .label-error { color: #FF4757; }
    .status-updated { text-align: center; font-size: 12px; color: var(--muted); margin-top: 24px; }
    .incident-section { margin-top: 40px; }
    .incident-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
    .incident-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 8px; }
    .incident-date { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .incident-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .incident-desc { font-size: 12px; color: var(--sec); }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page-wrap" style="max-width:680px; margin:0 auto;">
  <div class="page-header">
    <div class="section-label">SİSTEM DURUMU</div>
    <h1>Tüm Sistemler <span>Çalışıyor</span></h1>
  </div>

  <div class="status-banner ok" id="main-banner">
    <div class="status-banner-icon">✅</div>
    <div class="status-banner-title">Tüm sistemler normal çalışıyor</div>
  </div>

  <div class="status-list" id="status-list">
    <div style="text-align:center;color:var(--muted);padding:20px;">Kontrol ediliyor...</div>
  </div>

  <div class="status-updated" id="last-updated">Son güncelleme: —</div>

  <div class="incident-section">
    <div class="incident-title">📋 Geçmiş Olaylar</div>
    <div class="incident-item">
      <div class="incident-date">1 Temmuz 2026</div>
      <div class="incident-name">✅ Planlı Bakım Tamamlandı</div>
      <div class="incident-desc">Veritabanı bakımı başarıyla tamamlandı. Toplam süre: 12 dakika.</div>
    </div>
    <div style="text-align:center;color:var(--muted);font-size:13px;padding:16px;">Geçmiş 90 gün içinde başka olay yok.</div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="data.js"></script>
<script src="nav.js"></script>
<script>
renderNav('status'); renderFooter()

const SERVICES = [
  { name: 'Sipariş Sistemi', url: 'https://sofrimapp.online' },
  { name: 'API & Veritabanı', url: 'https://hvmjkayittkivmfwdmhv.supabase.co/rest/v1/' },
  { name: 'Pazarlama Sitesi', url: 'https://sofrimapp.com' },
  { name: 'Yönetim Paneli', url: 'https://yonetim.sofrimapp.online' },
]

async function checkStatus() {
  const list = document.getElementById('status-list')
  list.innerHTML = ''
  let allOk = true

  for (const svc of SERVICES) {
    const item = document.createElement('div')
    item.className = 'status-item'
    try {
      const res = await fetch(svc.url, { mode: 'no-cors' })
      item.innerHTML = `<div class="status-dot dot-ok"></div><div class="status-name">${svc.name}</div><span class="status-label label-ok">Çalışıyor</span>`
    } catch(e) {
      allOk = false
      item.innerHTML = `<div class="status-dot dot-warn"></div><div class="status-name">${svc.name}</div><span class="status-label label-warn">Kontrol Edilemiyor</span>`
    }
    list.appendChild(item)
  }

  document.getElementById('last-updated').textContent = 'Son güncelleme: ' + new Date().toLocaleString('tr-TR')
}

checkStatus()
setInterval(checkStatus, 60000)
</script>
</body>
</html>
