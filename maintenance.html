<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakım Modu — Sofrım</title>
  <link rel="icon" href="https://hvmjkayittkivmfwdmhv.supabase.co/storage/v1/object/public/assets/sofrim_logo.jpeg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: #07070F; color: #F0F0F8; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .wrap { text-align: center; max-width: 480px; }
    .logo { width: 72px; height: 72px; border-radius: 18px; margin: 0 auto 24px; }
    h1 { font-size: 2rem; font-weight: 900; margin-bottom: 12px; }
    h1 span { color: #FF6B1A; }
    p { color: #8888AA; line-height: 1.8; margin-bottom: 32px; }
    .eta { display: inline-block; padding: 10px 24px; border-radius: 20px; background: #FF6B1A20; border: 1px solid #FF6B1A44; color: #FF6B1A; font-size: 13px; font-weight: 700; margin-bottom: 32px; }
    .contact { font-size: 13px; color: #8888AA; }
    .contact a { color: #2DD4BF; text-decoration: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid #1E1E2E; border-top-color: #FF6B1A; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="https://hvmjkayittkivmfwdmhv.supabase.co/storage/v1/object/public/assets/sofrim_logo.jpeg" alt="Sofrım">
    <div class="spinner"></div>
    <h1>Bakım <span>Modundayız</span></h1>
    <p>Sistemi daha iyi hale getirmek için kısa süreli bir bakım yapıyoruz. En kısa sürede geri döneceğiz.</p>
    <div class="eta">⏱️ Tahmini süre: 30 dakika</div>
    <div class="contact">Acil durumlar için: <a href="mailto:destek@sofrimapp.com">destek@sofrimapp.com</a></div>
  </div>
</body>
</html>
